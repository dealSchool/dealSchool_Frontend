[build]
  command = "npm ci && npm run build:website"
  publish = "apps/website/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA routing — all paths fall back to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Correct MIME types for JS module scripts
[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*.mjs"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*.ts"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

# Cache immutable hashed assets from Vite build
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# No-cache for index.html so new deploys are picked up immediately
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
